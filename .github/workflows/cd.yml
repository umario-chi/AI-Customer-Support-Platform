name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Update Helm values
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "TAG=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/  tag: .*/  tag: ${{ steps.tag.outputs.TAG }}/" helm/ai-platform/values.yaml

      - name: Commit and push
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"
          git add helm/ai-platform/values.yaml
          git diff --cached --quiet || git commit -m "ci: deploy image ${{ steps.tag.outputs.TAG }} [skip ci]"
          git push
