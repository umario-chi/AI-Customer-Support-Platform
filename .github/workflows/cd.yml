name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "local"

jobs:
  deploy:
    name: Update Helm values
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/  tag: .*/  tag: ${{ github.event.inputs.image_tag }}/" helm/ai-platform/values.yaml

      - name: Commit and push
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"
          git add helm/ai-platform/values.yaml
          git diff --cached --quiet || git commit -m "ci: deploy image ${{ github.event.inputs.image_tag }} [skip ci]"
          git push
