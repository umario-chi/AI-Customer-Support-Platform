image:
  repository: ghcr.io/umario-chi/ai-customer-support-platform/ai-platform
  tag: sha-b5f2976
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  host: localhost

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: APP_ENV
    value: "development"
  - name: APP_LOG_LEVEL
    value: "debug"
  - name: LLM_BASE_URL
    value: "https://api.groq.com/openai/v1"
  - name: LLM_MODEL
    value: "llama-3.3-70b-versatile"
  - name: QDRANT_COLLECTION
    value: "faq_documents"
  - name: CACHE_TTL_SECONDS
    value: "3600"
