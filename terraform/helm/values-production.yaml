replicaCount: 2

image:
  repository: ghcr.io/umario-chi/ai-customer-support-platform/ai-platform
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  host: ai.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

env:
  - name: APP_ENV
    value: "production"
  - name: APP_LOG_LEVEL
    value: "warning"
  - name: LLM_BASE_URL
    value: "https://api.groq.com/openai/v1"
  - name: LLM_MODEL
    value: "llama-3.3-70b-versatile"
  - name: QDRANT_COLLECTION
    value: "faq_documents"
  - name: CACHE_TTL_SECONDS
    value: "3600"
